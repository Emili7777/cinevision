<!DOCTYPE html>
<html lang="it">

<head>
    <title>Registrazione Cinema</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-dark">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        CineVision
                    </h2>

                    <h5 class="text-center mb-4">
                        Registrazione
                    </h5>

                    {% if errore %}
                        <div class="alert alert-danger">
                            {{ errore }}
                        </div>
                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <input
                                type="text"
                                name="nome"
                                class="form-control mb-3"
                                placeholder="Nome"
                                required>

                        <input
                                type="text"
                                name="cognome"
                                class="form-control mb-3"
                                placeholder="Cognome"
                                required>

                        <input
                                type="email"
                                name="email"
                                class="form-control mb-3"
                                placeholder="Email"
                                required>

                        <input
                                type="password"
                                name="password"
                                class="form-control mb-3"
                                placeholder="Password"
                                required>

                        <input
                                type="password"
                                name="conferma_password"
                                class="form-control mb-3"
                                placeholder="Conferma password"
                                required>

                        <button type="submit"
                                class="btn btn-danger w-100">
                            Registrati
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <a href="{% url 'login' %}" class="text-danger text-decoration-none">
                            Hai già un account? Accedi
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
