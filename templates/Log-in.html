<!DOCTYPE html>
<html>
<head>
    <title>Login Cinema</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="bg-dark">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="text-center mb-4">
                        CineVision
                    </h2>

                    <form method="POST">

                        {% csrf_token %}

                        <input
                                type="email"
                                name="email"
                                class="form-control mb-3"
                                placeholder="Email">

                        <input
                                type="password"
                                name="password"
                                class="form-control mb-3"
                                placeholder="Password">

                        <button type="submit"
                                class="btn btn-danger w-100">
                            Login
                        </button>

                        <div class="text-center mt-3">
                            <a href="{% url 'registrazione' %}" class="text-danger text-decoration-none">
                                Non hai un account? Registrati
                            </a>
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
